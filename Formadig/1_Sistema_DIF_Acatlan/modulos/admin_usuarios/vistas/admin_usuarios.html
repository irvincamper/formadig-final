<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - FORMADIG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../css/main.css?v=99">
    <link rel="stylesheet" href="../../../css/modules.css?v=99">
    <link rel="stylesheet" href="../../../css/dashboard.css?v=99">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --premium-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
            min-height: 100vh;
        }

        .workspace-content {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .premium-card {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--premium-shadow);
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--color-primary-dark);
        }

        .form-control {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 0.75rem 1rem;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(0, 118, 108, 0.1);
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            font-weight: 700;
            border-radius: 12px;
            background: var(--color-primary);
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(0,118,108,0.2);
        }

        .btn-submit:hover {
            background: var(--color-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,118,108,0.3);
        }

        .btn-submit:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-weight: 500;
            text-align: center;
        }

        .message.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .message.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .hidden {
            display: none;
        }

        .table-section {
            margin-bottom: 3rem;
        }

        .table-section h2 {
            color: var(--color-primary);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: var(--premium-shadow);
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, var(--color-primary) 0%, #005f54 100%);
            color: white;
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        tbody tr {
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        td {
            padding: 1rem;
        }

        .btn-delete {
            background: #dc2626;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #991b1b;
            transform: translateY(-1px);
        }

        .empty-message {
            text-align: center;
            padding: 2rem;
            color: #6c757d;
            font-style: italic;
        }

        .form-section {
            margin-top: 3rem;
        }

        .form-section h2 {
            color: var(--color-primary);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <header class="header"><!-- Inyectado por UI.setupHeader --></header>
    <aside class="sidebar" id="sidebarMenu"></aside>

    <main class="workspace">
        <div class="workspace-content">
            <div class="view__header" style="margin-bottom: 2rem;">
                <h1 class="view__title" style="color:var(--color-primary);">Gestión de Usuarios - Administradores</h1>
                <p class="text-muted" style="color: #6c757d;">Visualiza, agrega y elimina administradores del sistema DIF Acatlán.</p>
            </div>

            <!-- SECCIÓN 1: Lista de Usuarios -->
            <section class="table-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="margin: 0;">Administradores Registrados</h2>
                    <button id="btnAñadirUsuario" style="
                        display: inline-flex;
                        align-items: center;
                        gap: 0.5rem;
                        padding: 0.75rem 1.5rem;
                        background: var(--color-primary);
                        color: white;
                        border: none;
                        border-radius: 10px;
                        font-weight: 600;
                        cursor: pointer;
                        font-size: 1rem;
                        transition: all 0.3s;
                        box-shadow: 0 4px 12px rgba(0,118,108,0.2);
                    " onmouseover="this.style.background='var(--color-primary-dark)'; this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 16px rgba(0,118,108,0.3)';" onmouseout="this.style.background='var(--color-primary)'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(0,118,108,0.2)';">
                        ➕ Añadir Usuario
                    </button>
                </div>
                <div id="usuariosMessage" class="message hidden"></div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Usuario</th>
                                <th>Nombre Completo</th>
                                <th>Rol</th>
                                <th>Teléfono</th>
                                <th>Fecha Creación</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usuarios-tbody">
                            <tr><td colspan="6" class="empty-message">Cargando administradores...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- MODAL: Formulario para Agregar Usuario -->
            <div id="modalAgregarUsuario" style="
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.6);
                z-index: 1000;
                justify-content: center;
                align-items: center;
            " onclick="cerrarModal(event)">
                <div class="premium-card" style="
                    margin: 0;
                    max-width: 500px;
                    width: 90%;
                    position: relative;
                    animation: slideUp 0.3s ease-out;
                " onclick="event.stopPropagation();">
                    <button id="btnCerrarModal" style="
                        position: absolute;
                        top: 1.5rem;
                        right: 1.5rem;
                        width: 32px;
                        height: 32px;
                        border: none;
                        background: #e2e8f0;
                        border-radius: 50%;
                        cursor: pointer;
                        font-size: 1.2rem;
                        color: #64748b;
                        transition: all 0.2s;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                    " onclick="cerrarModal()" onmouseover="this.style.background='#cbd5e1';" onmouseout="this.style.background='#e2e8f0';">
                        ✕
                    </button>

                    <h2 style="margin-top: 0; color: var(--color-primary);">Agregar Nuevo Administrador</h2>
                    
                    <div id="formMessage" class="message hidden"></div>
                    
                    <form id="agregar-usuario-form">
                        <div class="form-group">
                            <label class="form-label" for="nombre_usuario">Usuario (ej. director)</label>
                            <input 
                                type="text" 
                                id="nombre_usuario" 
                                class="form-control" 
                                placeholder="Usuario (ej. director)"
                                required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="nombre_completo">Nombre Completo</label>
                            <input 
                                type="text" 
                                id="nombre_completo" 
                                class="form-control" 
                                placeholder="Nombre Completo"
                                required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="rol">Rol</label>
                            <select id="rol" class="form-control" required>
                                <option value="">-- Selecciona Rol --</option>
                                <option value="admin">Administrador General (admin)</option>
                                <option value="admin_desayunos">Admin Desayunos (admin_desayunos)</option>
                                <option value="admin_traslados">Admin Traslados (admin_traslados)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="telefono">Teléfono</label>
                            <input 
                                type="text" 
                                id="telefono" 
                                class="form-control" 
                                placeholder="Teléfono"
                                required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="curp">CURP</label>
                            <input 
                                type="text" 
                                id="curp" 
                                class="form-control" 
                                placeholder="CURP"
                                required>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <button type="submit" class="btn-submit" id="btnAgregar" style="margin-bottom: 0;">Guardar Administrador</button>
                            <button type="button" class="btn-submit" id="btnCancelarForm" style="margin-bottom: 0; background: #6c757d;" onclick="cerrarModal()">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- CSS para animación del modal -->
            <style>
                @keyframes slideUp {
                    from {
                        opacity: 0;
                        transform: translateY(30px);
                    }
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }
            </style>
        </div>
    </main>

    <script src="../../../core/formadig-core.js?v=275"></script>
    <script src="../logica/admin_usuarios.js?v=99"></script>
</body>
</html>
