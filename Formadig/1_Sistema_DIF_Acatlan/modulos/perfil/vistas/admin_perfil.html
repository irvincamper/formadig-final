<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - FORMADIG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../css/main.css?v=99">
    <link rel="stylesheet" href="../../../css/modules.css?v=99">
    <link rel="stylesheet" href="../../../css/dashboard.css?v=99">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --premium-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
            min-height: 100vh;
        }

        .workspace-content {
            animation: fadeIn 0.6s ease-out;
            padding: 2.5rem;
            max-width: 900px;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .premium-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
            margin-bottom: 2rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Profile Header Card */
        .profile-header-card {
            display: flex;
            align-items: center;
            padding: 2.5rem;
            gap: 2rem;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--color-primary), #005a52);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 20px rgba(0, 118, 108, 0.2);
            text-transform: uppercase;
        }

        .profile-title-area h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -0.5px;
        }

        .role-badge {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.35rem 1rem;
            background: #dcfce7;
            color: #166534;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Info Display Row */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.75rem 2.5rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
        }

        .btn-edit-inline {
            background: transparent;
            color: var(--color-primary);
            border: 1.5px solid var(--color-primary);
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-edit-inline:hover {
            background: rgba(0, 118, 108, 0.05);
            transform: translateY(-1px);
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalSlideUp 0.3s ease-out;
            overflow: hidden;
        }

        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 800;
            color: #1e293b;
        }

        .modal-close {
            background: #f1f5f9;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #64748b;
            font-weight: bold;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .modal-body {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(0, 118, 108, 0.1);
        }

        .btn-save {
            width: 100%;
            padding: 1rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-save:hover { background: #005a52; }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }

        .hidden { display: none; }
    </style>
</head>

<body>
    <header class="header"><!-- Inyectado por UI.setupHeader --></header>
    <aside class="sidebar" id="sidebarMenu"></aside>

    <main class="workspace">
        <div class="workspace-content">
            <!-- 1. HEADER CARD -->
            <div class="premium-card profile-header-card">
                <div id="userAvatar" class="profile-avatar">--</div>
                <div class="profile-title-area">
                    <h1 id="displayNombre">Cargando...</h1>
                    <span id="displayRol" class="role-badge">Rol de Usuario</span>
                </div>
            </div>

            <!-- 2. INFO CARD -->
            <div class="premium-card">
                <div class="info-row">
                    <div>
                        <div class="info-label">Nombre Completo</div>
                        <div id="valNombre" class="info-value">Cargando...</div>
                    </div>
                </div>
                <div class="info-row">
                    <div>
                        <div class="info-label">Número de Teléfono</div>
                        <div id="valTelefono" class="info-value">Cargando...</div>
                    </div>
                    <button class="btn-edit-inline" id="btnOpenEditData">
                        <span>✏️</span> Modificar Datos
                    </button>
                </div>
            </div>

            <!-- 3. SECURITY CARD -->
            <div class="premium-card">
                <div class="info-row">
                    <div>
                        <div class="info-label">Seguridad de la Cuenta</div>
                        <div class="info-value">Contraseña: ••••••••••</div>
                    </div>
                    <button class="btn-edit-inline" id="btnOpenEditPass">
                        <span>🔒</span> Cambiar Contraseña
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL: MODIFICAR DATOS -->
    <div id="modalData" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Modificar Información</h3>
                <button class="modal-close" onclick="closeModal('modalData')">✕</button>
            </div>
            <div class="modal-body">
                <form id="formData">
                    <div class="form-group">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="editNombre" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" id="editTelefono" class="form-control">
                    </div>
                    <button type="submit" class="btn-save" id="btnSaveData">Guardar Cambios</button>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL: CAMBIAR CONTRASEÑA -->
    <div id="modalPass" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Establecer Nueva Contraseña</h3>
                <button class="modal-close" onclick="closeModal('modalPass')">✕</button>
            </div>
            <div class="modal-body">
                <form id="formPass">
                    <div class="form-group" style="position: relative;">
                        <label class="form-label">Contraseña Actual</label>
                        <input type="password" id="oldPass" class="form-control" placeholder="Ingrese su contraseña actual" style="padding-right: 40px;">
                        <button type="button" onclick="togglePassVisibility('oldPass', this)" style="position: absolute; right: 12px; top: 36px; background: none; border: none; cursor: pointer; font-size: 1.2rem; outline: none;" title="Mostrar contraseña">👁️</button>
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label class="form-label">Escriba su Nueva Contraseña</label>
                        <input type="password" id="newPass" class="form-control" placeholder="Mínimo 8 caracteres" minlength="8" style="padding-right: 40px;">
                        <button type="button" onclick="togglePassVisibility('newPass', this)" style="position: absolute; right: 12px; top: 36px; background: none; border: none; cursor: pointer; font-size: 1.2rem; outline: none;" title="Mostrar contraseña">👁️</button>
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label class="form-label">Confirme la Nueva Contraseña</label>
                        <input type="password" id="confirmPass" class="form-control" placeholder="Repita la nueva contraseña" minlength="8" style="padding-right: 40px;">
                        <button type="button" onclick="togglePassVisibility('confirmPass', this)" style="position: absolute; right: 12px; top: 36px; background: none; border: none; cursor: pointer; font-size: 1.2rem; outline: none;" title="Mostrar contraseña">👁️</button>
                    </div>
                    <button type="submit" class="btn-save" id="btnSavePass">Actualizar Contraseña</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts Globales y Dependencias -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.0"></script>
    <script src="../../../core/formadig-core.js?v=278"></script>
    <script src="../../../scripts/utilities-standard.js?v=1"></script>
    
    <!-- Lógica del Módulo -->
    <script src="../logica/perfil.js?v=3"></script>
</body>

</html>
